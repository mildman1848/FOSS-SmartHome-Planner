name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Validate required files
        shell: bash
        run: |
          set -euo pipefail
          test -f README.md
          test -f README.DE.md
          test -f SECURITY.md
          test -f SECURITY.DE.md
          test -f VERSION
          test -f Dockerfile
          test -f Makefile
          test -f docker-compose.yml

      - name: Run repository validation
        run: make validate

      - name: Build image
        run: make build
